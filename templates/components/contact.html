{% extends 'components/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container mx-auto py-12">
    <div class="bg-white shadow-md rounded-lg p-8 max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold mb-6 text-center">Contáctanos</h2>
        
        <form action="{% url 'super:contact' %}" method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="name" class="block text-gray-700 font-semibold mb-2">
                        <i class='bx bx-user'></i> Nombre Completo
                    </label>
                    <input type="text" id="name" name="name" 
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="Ingresa tu nombre" required>
                </div>
                <div>
                    <label for="email" class="block text-gray-700 font-semibold mb-2">
                        <i class='bx bx-envelope'></i> Tu Correo Electrónico
                    </label>
                    <input type="email" id="email" name="email" 
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="correo@ejemplo.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="subject" class="block text-gray-700 font-semibold mb-2">
                    <i class='bx bx-subject'></i> Asunto
                </label>
                <input type="text" id="subject" name="subject" 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                       placeholder="Motivo de tu mensaje" required>
            </div>

            <div class="mb-4">
                <label for="message" class="block text-gray-700 font-semibold mb-2">
                    <i class='bx bx-message-detail'></i> Mensaje
                </label>
                <textarea id="message" name="message" rows="5" 
                          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                          placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition duration-300">
                <i class='bx bx-send'></i> Enviar Mensaje
            </button>
        </form>
    </div>

    <div class="bg-white shadow-md rounded-lg p-8 max-w-2xl mx-auto mt-6">
        <h2 class="text-2xl font-bold mb-6 text-center">Información de Contacto</h2>
        <ul class="space-y-3 text-gray-700">
            <li><i class='bx bx-phone text-blue-600'></i> <strong>Teléfono:</strong> (09) XXX-XXXX</li>
            <li><i class='bx bx-envelope text-blue-600'></i> <strong>Email:</strong> contacto@supermarket.com</li>
            <li><i class='bx bx-map text-blue-600'></i> <strong>Dirección:</strong> Av. Principal 123, Guayaquil, Ecuador</li>
        </ul>
    </div>
</div>
{% endblock %}
