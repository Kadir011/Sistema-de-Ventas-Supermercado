{% extends 'components/base.html' %}
{% load static %}
{% block title %}{{ title }}{% endblock %}
{% block content %}

<link rel="stylesheet" href="{% static 'css/seller/seller_delete.css' %}">

<div class="delete-wrap">
  <div class="delete-card">
    <div class="delete-header">
      <div class="delete-icon-ring">
        <i class='bx bx-badge-check text-red-500' style="font-size:2rem;"></i>
      </div>
      <div class="delete-title">{{ title }}</div>
      <div class="delete-subtitle">Acción irreversible</div>
    </div>

    <div class="delete-body">
      <div class="delete-desc">
        <i class='bx bx-error-circle'></i>
        <span>{{ description }}</span>
      </div>

      <div class="delete-warning">
        <i class='bx bx-lock-alt'></i>
        Esta acción no se puede deshacer
      </div>

      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-delete">
          <i class='bx bx-trash'></i> {{ grabar }}
        </button>
      </form>

      <a href="{{ back_url }}" class="btn-cancel">
        <i class='bx bx-arrow-back'></i> Cancelar y volver
      </a>
    </div>
  </div>
</div>

{% endblock %}
